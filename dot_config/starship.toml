[username]
show_always = true
style_user = "bg:color_user fg:color_fg_user"
style_root = "bg:color_user fg:color_fg_user"
format = '[$user ]($style)'
disabled = false

[os]
style = "bg:color_user fg:color_fg"
disabled = true

[directory]
style = "bg:color_pwd fg:color_fg"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇĞ/"

